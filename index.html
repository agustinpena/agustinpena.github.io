<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agustín Peña | Developer</title>
  <style>
    /* Reset & Typography */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle at 50% 50%, #0d1527 0%, #05070f 100%);
      font-family: 'Courier New', Courier, monospace;
      padding: 20px;
      overflow-x: hidden; /* Prevents mobile scrollbars */
    }

    /* Ambient Background Grid Pattern */
    body::before {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background-image: 
        linear-gradient(rgba(0, 242, 254, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 242, 254, 0.03) 1px, transparent 1px);
      background-size: 20px 20px;
      z-index: 0;
    }

    /* Responsive Scaler Wrapper Container */
    .responsive-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      max-width: 1000px; /* Matches card size */
    }

    /* Outer Card Framework */
    .futuristic-card {
      position: relative;
      width: 1000px;
      height: 560px;
      background: rgba(10, 20, 38, 0.7);
      border: 2px solid rgba(0, 242, 254, 0.25);
      border-radius: 24px;
      padding: 60px 45px; 
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      box-shadow: 
        0 0 60px rgba(0, 242, 254, 0.15),
        inset 0 0 30px rgba(0, 242, 254, 0.05);
      z-index: 1;
      display: grid;
      grid-template-columns: 0.7fr 2.3fr; 
      gap: 40px;
      transform-origin: center center; /* Anchors the card layout when scaling */
    }

    /* Technical Corner Bracket Elements */
    .futuristic-card::before, .futuristic-card::after {
      content: "";
      position: absolute;
      width: 30px;
      height: 30px;
      border-color: #00f2fe;
      border-style: solid;
      pointer-events: none;
    }
    
    /* Top-Left Bracket */
    .futuristic-card::before {
      top: -4px;
      left: -4px;
      border-width: 6px 0 0 6px;
    }

    /* Bottom-Right Bracket */
    .futuristic-card::after {
      bottom: -4px;
      right: -4px;
      border-width: 0 6px 6px 0;
    }

    /* Left Section: Identity Matrix */
    .identity-panel {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding-right: 30px;
    }

    .status-indicator {
      font-size: 1.1rem;
      color: #00f2fe;
      letter-spacing: 4px;
      text-transform: uppercase;
    }

    .status-indicator::before {
      content: "● ";
      color: #4facfe;
    }

    .node-id {
      margin-top: 30px;
    }

    .node-id h1 {
      font-size: 2.6rem; 
      color: #ffffff;
      font-weight: bold;
      letter-spacing: 2px;
      text-transform: uppercase;
      text-shadow: 0 0 16px rgba(255, 255, 255, 0.4);
      line-height: 1.2;
    }

    .node-id p {
      font-size: 1.4rem;
      color: #4facfe;
      margin-top: 8px;
      letter-spacing: 6px;
      text-transform: uppercase;
    }

    .tech-spec {
      font-size: 1.1rem;
      color: rgba(0, 242, 254, 0.4);
      line-height: 1.5;
    }

    /* Right Section: Comm Link Data Grid */
    .data-panel {
      display: flex;
      flex-direction: column;
      justify-content: flex-start; 
      padding-right: 20px; 
      height: 100%;
      margin-top: 180px; 
    }

    .data-row {
      display: flex;
      flex-direction: column;
      width: 100%;
      margin-top: 18px; 
    }

    /* The alignment setup you loved */
    .data-label, .data-value {
      margin-left: -550px; 
      position: relative;  
      z-index: 10;        
    }

    .data-label {
      font-size: 1.1rem;
      color: rgba(79, 172, 254, 0.6);
      text-transform: uppercase;
      letter-spacing: 4px;
      margin-bottom: 4px;
    }

    .data-value {
      font-size: 1.35rem; 
      color: #ffffff;
      letter-spacing: 0.5px; 
      word-wrap: break-word;
      word-break: break-all;
      overflow-wrap: break-word;
      line-height: 1.3;
    }

    .data-value span {
      color: #00f2fe;
    }

    /* FLUID RESPONSIVE ENGINE (Locks layout architecture using aspect ratio container calculations) */
    @media (max-width: 1040px) {
      .responsive-wrapper {
        width: 90vw;
        height: calc(90vw * (560 / 1000)); /* Dynamically calculates layout aspect heights */
      }
      .futuristic-card {
        transform: scale(calc(90vw / 1000)); /* Math function to safely scale down elements */
      }
    }
  </style>
</head>
<body>

  <!-- Wrapped card element inside the fluid viewport scaling system -->
  <div class="responsive-wrapper">
    <div class="futuristic-card">
            
        <div class="status-indicator">SYS_ACTIVE // IND_86</div>
        
        <div class="node-id">
          <h1>Agustín Peña</h1>
          <p>Cool Freelance Developer</p>
        </div>
        
        <div class="tech-spec">
          LOC: ST_PETERSBURG<br>
          NET: SECURE_LINK_v9<br>
          SIG: STABLE_NODE
        </div>
      </div>

      <!-- Right Data Links Panel -->
      <div class="data-panel">
        <div class="data-row">
          <span class="data-label">COMMLINK // EMAIL</span>
          <span class="data-value">j.agustin.pena.a<span>@</span>gmail.com</span>
        </div>
        
        <div class="data-row">
          <span class="data-label">QUANTUM ID // PHONE</span>
          <span class="data-value">+7 (981) 863 55 25</span>
        </div>
        
        <div class="data-row">
          <span class="data-label">TELEGRAM // ID</span>
          <span class="data-value"><span>@</span>agustinpena</span>
        </div>
      </div>

    </div>
  </div>

</body>
</html>
