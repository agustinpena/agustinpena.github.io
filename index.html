<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Agustín Peña | Developer</title>
  <!-- OSWALD FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: radial-gradient(ellipse at 30% 40%, #0a0718 0%, #02010a 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Oswald', sans-serif;
      padding: 2rem;
      position: relative;
      overflow-x: hidden;
    }

    .cyber-grid {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        linear-gradient(rgba(0, 255, 255, 0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 255, 255, 0.08) 1px, transparent 1px);
      background-size: 40px 40px;
      z-index: 0;
      pointer-events: none;
    }

    .glow-orb-1 {
      position: fixed;
      width: 550px;
      height: 550px;
      background: radial-gradient(circle, #ff00cc70, #7000ff30, transparent);
      border-radius: 50%;
      filter: blur(120px);
      top: -180px;
      left: -180px;
      z-index: 0;
      opacity: 0.45;
    }

    .glow-orb-2 {
      position: fixed;
      width: 650px;
      height: 650px;
      background: radial-gradient(circle, #00e0ff60, #0055ff20, transparent);
      border-radius: 50%;
      filter: blur(140px);
      bottom: -220px;
      right: -180px;
      z-index: 0;
      opacity: 0.4;
    }

    .nova-card {
      width: 880px;
      max-width: 92vw;
      min-height: 520px;
      background: rgba(8, 12, 25, 0.48);
      backdrop-filter: blur(24px) saturate(220%);
      -webkit-backdrop-filter: blur(24px) saturate(220%);
      border-radius: 54px;
      border: 1.5px solid rgba(0, 255, 255, 0.5);
      box-shadow: 0 30px 55px -12px rgba(0, 0, 0, 0.9), 0 0 0 1.5px rgba(0, 255, 255, 0.3), inset 0 1px 2px rgba(255,255,255,0.1);
      padding: 2.5rem 2.8rem;
      z-index: 10;
      display: flex;
      flex-direction: column;
      transition: none;
      position: relative;
    }

    .nova-card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 54px;
      padding: 2.5px;
      background: linear-gradient(125deg, rgba(0,255,255,0.7), rgba(255,0,204,0.5), rgba(0, 255, 200, 0.3));
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      flex-wrap: wrap;
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    .identity {
      flex: 1;
    }

    /* NEW: wrapper for extra padding and protection */
    .name-wrapper {
      margin-bottom: 8px;
      padding: 4px 0;
    }

    .name {
      font-size: 64px;
      font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(145deg, #FFFFFF, #5effe6, #e084fc, #aa6eff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 12px rgba(0,255,255,0.4);
      font-family: 'Oswald', sans-serif;
      line-height: 1.4;        /* More breathing room vertically */
      text-transform: none;
      padding: 8px 0;          /* Extra padding top/bottom inside the text */
      display: block;
      width: 100%;
    }

    .title-wrapper {
      display: flex;
      align-items: center;
      gap: 18px;
      flex-wrap: wrap;
      margin-top: 12px;        /* Increased separation from name */
    }

    .role {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #abfff6;
      background: rgba(0, 255, 255, 0.12);
      padding: 10px 24px;
      border-radius: 60px;
      backdrop-filter: blur(6px);
      border-left: 3px solid #0ff;
      font-family: 'Oswald', sans-serif;
      display: inline-block;
      white-space: nowrap;
    }

    @media (max-width: 700px) {
      .role {
        white-space: normal;
        font-size: 16px;
        padding: 6px 16px;
      }
      .name {
        font-size: 48px;
        line-height: 1.35;
      }
      .title-wrapper {
        margin-top: 8px;
      }
    }

    .icon-badge {
      display: flex;
      gap: 24px;
      align-items: center;
    }

    .icon-svg {
      width: 68px;
      height: 68px;
      filter: drop-shadow(0 0 6px cyan);
    }

    .contact-grid {
      margin-top: 1.8rem;
      display: flex;
      flex-direction: column;
      gap: 24px;
      border-top: 1.5px solid rgba(0, 255, 255, 0.4);
      padding-top: 2rem;
    }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 22px;
      font-size: 18px;
      font-weight: 500;
      color: #eef5ff;
      letter-spacing: 0.5px;
      font-family: 'Oswald', sans-serif;
      backdrop-filter: blur(4px);
      transition: none;
    }

    .contact-icon {
      width: 42px;
      height: 42px;
      flex-shrink: 0;
      filter: drop-shadow(0 0 4px #0ff);
    }

    .contact-text {
      word-break: break-word;
      background: linear-gradient(125deg, #fff, #c0f2ff, #b4f0ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      font-weight: 500;
      font-size: 18px;
      font-family: 'Oswald', sans-serif;
      letter-spacing: 0.3px;
    }

    .meta-section {
      margin-top: 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 18px;
      background: rgba(0, 20, 30, 0.6);
      border-radius: 100px;
      padding: 14px 28px;
      border: 0.8px solid rgba(0, 255, 255, 0.5);
    }

    .meta-data {
      font-family: 'Oswald', monospace;
      font-size: 15px;
      font-weight: 600;
      color: #0ff;
      text-transform: uppercase;
      letter-spacing: 2.5px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .fingerprint-icon {
      width: 30px;
      height: 30px;
      filter: drop-shadow(0 0 5px cyan);
    }

    .quantum-chip {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 14px;
      background: rgba(0,0,0,0.55);
      padding: 8px 20px;
      border-radius: 50px;
      border-right: 2.5px solid #0ff;
      border-left: 1px solid rgba(0,255,255,0.3);
      font-family: 'Oswald', sans-serif;
      font-weight: 500;
    }

    .nova-card:hover, .nova-card:active {
      transform: none;
      border-color: rgba(0, 255, 255, 0.6);
    }

    @media (max-width: 950px) {
      .nova-card {
        width: 85vw;
        padding: 1.8rem;
      }
      .name {
        font-size: 52px;
      }
      .role {
        font-size: 18px;
      }
      .icon-svg {
        width: 52px;
        height: 52px;
      }
      .contact-item {
        font-size: 15px;
        gap: 16px;
      }
      .contact-icon {
        width: 34px;
        height: 34px;
      }
      .contact-text {
        font-size: 15px;
      }
      .meta-data {
        font-size: 12px;
      }
    }

    @media (max-width: 680px) {
      .nova-card {
        padding: 1.4rem;
      }
      .name {
        font-size: 40px;
        line-height: 1.3;
      }
      .role {
        font-size: 14px;
        padding: 6px 14px;
      }
      .icon-svg {
        width: 42px;
        height: 42px;
      }
      .contact-item {
        font-size: 13px;
        gap: 12px;
      }
      .contact-icon {
        width: 28px;
        height: 28px;
      }
      .contact-text {
        font-size: 13px;
      }
      .meta-section {
        padding: 10px 16px;
      }
      .meta-data {
        font-size: 10px;
        gap: 8px;
      }
      .fingerprint-icon {
        width: 22px;
        height: 22px;
      }
      .quantum-chip {
        font-size: 10px;
        padding: 4px 12px;
      }
    }

    @media (max-width: 480px) {
      .name {
        font-size: 32px;
        line-height: 1.25;
      }
      .role {
        font-size: 11px;
        letter-spacing: 1.5px;
      }
      .icon-svg {
        width: 34px;
        height: 34px;
      }
    }
  </style>
</head>
<body>

  <div class="cyber-grid"></div>
  <div class="glow-orb-1"></div>
  <div class="glow-orb-2"></div>

  <div class="nova-card">

</html>
